services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mylisapp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      target: production
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-mylisapp_db}
      JWT_SECRET: ${JWT_SECRET:-mylis-very-sec-key}
      PORT: 3025
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:9001}
      SMTP_HOST: ${SMTP_HOST:-ssl0.ovh.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-mychurch@lis.cm}
      SMTP_PASS: ${SMTP_PASS:-L1sm0negli5e}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "127.0.0.1:3025:3025"

  whisper:
    build:
      context: ./whisper-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}

  ui:
    build:
      context: ./UI
      target: production
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
