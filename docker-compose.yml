services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mylisapp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      target: development
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-mylisapp_db}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 3025
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:9001}
    volumes:
      - ./uploads:/app/uploads
      - ./server/src:/app/src
    ports:
      - "${SERVER_PORT:-3025}:3025"
    develop:
      watch:
        - action: sync
          path: ./server/src
          target: /app/src
        - action: rebuild
          path: ./server/package.json

  whisper:
    build:
      context: ./whisper-service
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}

  ui:
    build:
      context: ./UI
      target: development
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - UI_PORT=${UI_PORT:-8080}
    volumes:
      - ./UI/src:/app/src
      - ./UI/index.html:/app/index.html
      - ./UI/vite.config.ts:/app/vite.config.ts
    ports:
      - "${UI_PORT:-8080}:5173"
    develop:
      watch:
        - action: sync
          path: ./UI/src
          target: /app/src
        - action: rebuild
          path: ./UI/package.json

volumes:
  pgdata:
